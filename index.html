<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />   
    <title>Hand Convex Hull - OpenCV.js</title> 
    <style>
      body { font-family: sans-serif; }
      canvas { border: 1px solid #ccc; max-width: 720px; width: 100%; height: auto; }
      #status { margin: 10px 0; }
    </style>
  </head>
  <body>
    <h2>Hand Convex Hull - OpenCV.js</h2>
    <div id="status">Loading OpenCV...</div>

    <img id="srcImg" src="hand.jpg" crossorigin="anonymous" style="display:none;" />
    <canvas id="canvas"></canvas>

    <!-- Load OpenCV.js from CDN -->
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>

    <script>
      const statusEl = document.getElementById("status");
      const imgEl = document.getElementById("srcImg");
      const canvasEl = document.getElementById("canvas");

      function run() {
        statusEl.textContent = "Running convex hull...";

        // Read image
        let src = cv.imread(imgEl);
        let dst = src.clone();

        // Preprocess: gray -> blur -> threshold
        let gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);

        let blur = new cv.Mat();
        cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);

        let thresh = new cv.Mat();
        cv.threshold(blur, thresh, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);

        // Find contours
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();
        cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

        if (contours.size() === 0) {
          statusEl.textContent = "No contours found. Try a clearer hand image / background.";
          cv.imshow(canvasEl, src);
          src.delete(); dst.delete(); gray.delete(); blur.delete(); thresh.delete();
          contours.delete(); hierarchy.delete();
          return;
        }

        // Find largest contour (hand)
        let largestIdx = 0;
        let maxArea = 0;
        for (let i = 0; i < contours.size(); i++) {
          let area = cv.contourArea(contours.get(i), false);
          if (area > maxArea) {
            maxArea = area;
            largestIdx = i;
          }
        }

        let handContour = contours.get(largestIdx);

        // Draw contour (green)
        cv.drawContours(dst, contours, largestIdx, new cv.Scalar(0, 255, 0, 255), 2);

        // Convex hull
        let hullIdx = new cv.Mat();
        cv.convexHull(handContour, hullIdx, false, false); // return indices

        // Convert hull indices -> points
        let hullPts = new cv.Mat();
        cv.convexHull(handContour, hullPts, false, true); // return points

        // Draw hull (red polyline)
        // hullPts is Nx1 with Point
        let hullContours = new cv.MatVector();
        hullContours.push_back(hullPts);
        cv.polylines(dst, hullContours, true, new cv.Scalar(255, 0, 0, 255), 2);

        // Show result
        cv.imshow(canvasEl, dst);
        statusEl.textContent = `Done. Contours: ${contours.size()} | Hand area: ${maxArea.toFixed(0)}`;

        // Cleanup
        src.delete(); dst.delete(); gray.delete(); blur.delete(); thresh.delete();
        contours.delete(); hierarchy.delete();
        handContour.delete(); hullIdx.delete(); hullPts.delete(); hullContours.delete();
      }

      // Wait for OpenCV and image to load
      function onOpenCvReady() {
        statusEl.textContent = "OpenCV loaded. Waiting for image...";
        if (imgEl.complete) run();
        else imgEl.onload = run;
      }

      // opencv.js sets cv.onRuntimeInitialized when ready
      const waitForCV = setInterval(() => {
        if (typeof cv !== "undefined" && cv.Mat) {
          clearInterval(waitForCV);
          cv["onRuntimeInitialized"] = onOpenCvReady;
        }
      }, 50);
    </script>
  </body>
</html>
